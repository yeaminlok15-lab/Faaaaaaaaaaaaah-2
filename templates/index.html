<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }} — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: {{ theme_color }};
            --primary-dim: {{ theme_color }}33;
            --primary-glow: {{ theme_color }}66;
            --bg-dark: #050508;
            --card-bg: rgba(10, 10, 15, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Optimized Matrix Background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-dim);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px var(--primary-dim);
            position: relative;
            overflow: hidden;
        }

        /* Professional Scanline Effect */
        .auth-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            padding: 5px;
            box-shadow: 0 0 20px var(--primary-dim);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .terminal-status {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: var(--primary);
            opacity: 0.6;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--primary-dim);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-btn:hover {
            box-shadow: 0 0 25px var(--primary);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 10px;
            color: #4b5563;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="auth-card">
            <div class="logo-area">
                <img src="https://files.catbox.moe/g533ba.png" alt="Logo" class="logo-img">
                <div class="brand-name">{{ site_name }}</div>
            </div>

            <div class="terminal-status">
                <span id="status-text">INITIALIZING SECURE_LINK</span><span class="cursor"></span>
            </div>

            {% if error %}
            <div class="error-msg">ACCESS DENIED: {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <input type="password" name="password" placeholder="ENTER ACCESS CODE" required autofocus>
                </div>
                <button type="submit" class="auth-btn">Authorize</button>
            </form>

            <div class="footer">
                Encrypted Connection • Terminal v3.0.4
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const chars = "0101ABCDEFHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '{{ theme_color }}';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(draw);
        }

        draw();

        // Status Text Animation
        const statusEl = document.getElementById('status-text');
        const phrases = ["SYSTEM_READY", "AWAITING_CREDENTIALS", "ENCRYPTION_ACTIVE"];
        let count = 0;
        setInterval(() => {
            statusEl.textContent = phrases[count % phrases.length];
            count++;
        }, 3000);
    </script>
</body>
</html>
