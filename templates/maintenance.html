<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | {{ site_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --bg-dark: #050508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* প্রিমিয়াম ল্যাগ-ফ্রি গ্রিড ব্যাকগ্রাউন্ড */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* মুভিং ব্যাকগ্রাউন্ড ইফেক্ট */
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--danger-glow) 0%, transparent 70%);
            z-index: 2;
            animation: pulse 4s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 30px var(--danger-glow);
            position: relative;
            overflow: hidden;
        }

        /* টপ লাল স্ক্যানার বার */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--danger);
            box-shadow: 0 0 15px var(--danger);
        }

        .icon-box {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .icon {
            font-size: 70px;
            filter: drop-shadow(0 0 15px var(--danger));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--danger);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--danger-glow);
        }

        .sub-title {
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .message-box p {
            font-size: 15px;
            color: #d1d5db;
            line-height: 1.6;
            font-style: italic;
        }

        /* প্রফেশনাল ফুটার */
        .status-footer {
            font-size: 11px;
            color: #4b5563;
            letter-spacing: 2px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="card">
            <div class="icon-box">
                <div class="icon">⚙️</div>
            </div>
            
            <h1 class="title">MAINTENANCE</h1>
            <p class="sub-title">{{ site_name }} • CORE UPDATE</p>

            <div class="message-box">
                <p>"{{ message }}"</p>
            </div>

            <div class="status-footer">
                <span class="dot"></span>
                SYSTEMS OFFLINE • CHECKING BACK LATER
            </div>
        </div>
    </div>

</body>
</html>
